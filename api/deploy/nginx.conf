server {
    # Uncomment the next lines to enable HTTP
    # listen 80 default_server;
    # listen [::]:80 default_server;

    server_name polypup.org;

    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options DENY;
    add_header X-XSS-Protection "1; mode=block";

    gzip on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types text/plain text/css text/javascript application/json application/javascript application/x-javascript text/xml application/xml application/xml+rss;
    gzip_proxied any;
    gzip_vary on;

    location / {
        root /var/www/lang-web/build;
        try_files $uri /index.html;
    }

    location /api/ {
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass http://localhost:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # This redirect is needed for Firebase Auth to avoid third-party cookies issues.
    location /__/auth {
      proxy_pass https://lang-2dd5b.firebaseapp.com;
    }
}
